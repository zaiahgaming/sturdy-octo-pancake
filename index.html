<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" tabindex="0" aria-label="Neon Survivor Game Canvas"></canvas>
        <div id="ui-layer">
            <div id="score">Score: 0</div>
            <button id="fullscreen-btn" aria-pressed="false">Fullscreen</button>
            <div id="active-powerups" aria-hidden="true"></div>
            <div id="powerup-announcer" class="sr-only" aria-live="polite"></div>

            <div id="game-over" style="display: none;" role="dialog" aria-labelledby="game-over-title" aria-describedby="game-over-description" aria-modal="true">
                <h1 id="game-over-title">GAME OVER</h1>
                <p id="game-over-description">Score: <span id="final-score">0</span></p>
                <button id="restart-btn">Restart</button>
            </div>
            <div id="start-screen" role="dialog" aria-labelledby="start-screen-title" aria-describedby="start-screen-description" aria-modal="true">
                <h1 id="start-screen-title">NEON SURVIVOR</h1>
                <p id="start-screen-description">WASD to Move | Mouse to Aim | Left Click to Shoot | SPACE to Dash</p>
                <button id="start-btn" autofocus>Start Game</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
